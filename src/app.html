<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <!-- Match the canvas in each scheme so the mobile browser chrome doesn't clash. -->
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f4f5fa" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#15171e" />
    <meta
      name="description"
      content="trackcents — see where every cent goes. A private, offline-first money tracker. Your statements are parsed on your device and never leave the browser."
    />
    <!-- Standalone PWA hints. iOS data persistence (surviving the 7-day storage
         eviction the onboarding nudges around — US-P1-A / constitution IV) depends
         on the app launching standalone from the Home Screen; the manifest's
         display:standalone covers iOS 16.4+, these cover older iOS + set the title. -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="trackcents" />
    <!-- Social share preview -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="trackcents — see where every cent goes" />
    <meta
      property="og:description"
      content="A private, offline-first money tracker. Statements are parsed on your device and never leave the browser."
    />
    <meta property="og:image" content="%sveltekit.assets%/icons/icon-512.png" />
    <meta name="twitter:card" content="summary" />
    <link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="%sveltekit.assets%/icons/icon-192.png" />
    <link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
    <title>trackcents</title>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover" class="antialiased">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>

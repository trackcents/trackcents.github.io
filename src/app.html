<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta
      name="description"
      content="Private, offline-first personal finance tool. Your data stays on your device, encrypted."
    />
    <!-- Standalone PWA hints. iOS data persistence (surviving the 7-day storage
         eviction the onboarding nudges around — US-P1-A / constitution IV) depends
         on the app launching standalone from the Home Screen; the manifest's
         display:standalone covers iOS 16.4+, these cover older iOS + set the title. -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Money Tracker" />
    <link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="%sveltekit.assets%/icons/icon-192.png" />
    <link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
    <title>Money Tracker</title>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover" class="bg-neutral-950 text-neutral-100 antialiased">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
